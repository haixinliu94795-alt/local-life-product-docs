openapi: 3.0.3
info:
  title: 清结算平台 P0 普通商品接口契约
  version: V003
paths:
  /api/ccs/events/accept:
    post:
      summary: 接收核销/退款/取消核销事件
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SourceEventAcceptRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommonResponse'
  /admin/ccs/merchant-payable/page:
    get:
      summary: 后台商家应付分页查询
      parameters:
        - name: merchantId
          in: query
          schema: { type: string }
        - name: sourceOrderNo
          in: query
          schema: { type: string }
        - name: writeOffStartTime
          in: query
          schema: { type: string }
        - name: writeOffEndTime
          in: query
          schema: { type: string }
        - name: pageNo
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: OK
  /admin/ccs/merchant-payable/settle:
    post:
      summary: 单条/批量统一确认结算
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmMerchantSettlementRequest'
      responses:
        '200':
          description: OK
  /admin/ccs/settlement-bills/page:
    get:
      summary: 后台结算记录分页查询
      parameters:
        - name: billNo
          in: query
          schema: { type: string }
        - name: merchantId
          in: query
          schema: { type: string }
        - name: billStatus
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
  /admin/ccs/settlement-bills/{billNo}/retry-accounting:
    post:
      summary: 重试账务入账
      parameters:
        - name: billNo
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /admin/ccs/settlement-bills/{billNo}/repair-accounting:
    post:
      summary: 查询账务并修复 UNKNOWN
      parameters:
        - name: billNo
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
  /merchant/ccs/pending-items/page:
    get:
      summary: 商户端待结算明细分页
      responses:
        '200':
          description: OK
  /merchant/ccs/settlement-bills/page:
    get:
      summary: 商户端结算记录分页
      responses:
        '200':
          description: OK
  /merchant/ccs/settlement-bills/{billNo}:
    get:
      summary: 商户端结算详情
      parameters:
        - name: billNo
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
components:
  schemas:
    CommonResponse:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        result: { type: object }
    SourceEventAcceptRequest:
      type: object
      required: [sourceSystem, businessScene, eventType, sourceEventId, sourceBizNo, eventTime, payload]
      properties:
        sourceSystem: { type: string, example: LOCAL_LIFE_ORDER }
        businessScene: { type: string, example: LOCAL_LIFE_NORMAL }
        eventType:
          type: string
          enum: [ORDER_PAID, WRITE_OFF_COMPLETED, REFUND_SUCCESS, WRITE_OFF_CANCELED]
        sourceEventId: { type: string }
        sourceBizNo: { type: string }
        sourceOrderNo: { type: string }
        eventTime: { type: string, format: date-time }
        idempotentKey: { type: string }
        payload: { type: object }
    ConfirmMerchantSettlementRequest:
      type: object
      required: [businessScene, merchantId, pendingItemNos, operatorId, idempotentKey]
      properties:
        businessScene: { type: string, example: LOCAL_LIFE_NORMAL }
        merchantId: { type: string }
        settlementSubjectType: { type: string, default: MERCHANT }
        settlementSubjectId: { type: string }
        pendingItemNos:
          type: array
          items: { type: string }
        voucherUrls:
          type: array
          items: { type: string }
        operatorId: { type: string }
        operatorName: { type: string }
        remark: { type: string }
        idempotentKey: { type: string }
