openapi: 3.0.3
info:
  title: Clearing Settlement Platform API
  version: V005-P0
paths:
  /ccs/source-events:
    post:
      summary: Accept fulfillment-confirmed source event
      operationId: acceptSourceEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementSourceEventCommand'
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceEventResult'
  /admin/ccs/settlement-positions/eligible:
    get:
      summary: Query eligible settlement positions for merchant payable list
      parameters:
        - in: query
          name: merchantNo
          schema: { type: string }
        - in: query
          name: businessScene
          schema: { type: string }
        - in: query
          name: pageNo
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Page result
  /admin/ccs/settlement-bills/confirm:
    post:
      summary: Confirm settlement for one or many settlement positions
      operationId: confirmMerchantSettlement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmMerchantSettlementCommand'
      responses:
        '200':
          description: Settlement bill result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementBillResult'
  /ccs/settlement-bills/{billNo}:
    get:
      summary: Query settlement bill detail
      parameters:
        - in: path
          name: billNo
          required: true
          schema: { type: string }
      responses:
        '200': { description: Bill detail }
components:
  schemas:
    SettlementSourceEventCommand:
      type: object
      required: [callerSystem, bizDomain, bizNo, eventType, businessScene, sourceOrderNo, sourceFulfillmentNo, merchantNo, fulfillmentTime, orderAmountCent, paidAmountCent, merchantReceivableCent, platformReceivableCent, idempotentKey, requestHash]
      properties:
        callerSystem: { type: string }
        bizDomain: { type: string }
        bizNo: { type: string }
        eventType: { type: string, enum: [FULFILLMENT_CONFIRMED] }
        businessScene: { type: string }
        sourceOrderNo: { type: string }
        sourceFulfillmentNo: { type: string }
        merchantNo: { type: string }
        fulfillmentTime: { type: string, format: date-time }
        orderAmountCent: { type: integer, format: int64 }
        paidAmountCent: { type: integer, format: int64 }
        merchantReceivableCent: { type: integer, format: int64 }
        platformReceivableCent: { type: integer, format: int64 }
        discountCostCent: { type: integer, format: int64, default: 0 }
        idempotentKey: { type: string }
        requestHash: { type: string }
    SourceEventResult:
      type: object
      properties:
        eventNo: { type: string }
        processStatus: { type: string }
    ConfirmMerchantSettlementCommand:
      type: object
      required: [callerSystem, bizDomain, bizNo, merchantNo, businessScene, positionNos, operatorId, idempotentKey, requestHash]
      properties:
        callerSystem: { type: string }
        bizDomain: { type: string }
        bizNo: { type: string }
        merchantNo: { type: string }
        businessScene: { type: string }
        positionNos:
          type: array
          items: { type: string }
        operatorId: { type: string }
        operatorName: { type: string }
        voucherUrl: { type: string }
        remark: { type: string }
        idempotentKey: { type: string }
        requestHash: { type: string }
    SettlementBillResult:
      type: object
      properties:
        batchNo: { type: string }
        billNo: { type: string }
        billStatus: { type: string }
        postingNo: { type: string }
